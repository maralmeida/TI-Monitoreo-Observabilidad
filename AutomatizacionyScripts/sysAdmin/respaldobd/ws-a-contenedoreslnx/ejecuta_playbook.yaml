name: Contenerización de Base de Datos con Ansible

on:
  push:
    branches:
      - main
#    paths:
#      - "./Ansiblelb/**"

env:
  SRC_DIR: "./Ansiblelb/conteneriza_bd/ansible/config"

  INVENTORY_FILE: "./Ansiblelb/conteneriza_bd/ansible/config/inventory.ini"
  CONFIG_FILE: "./Ansiblelb/conteneriza_bd/ansible/config/ansible.cfg"

  PLAYBOOK_FILE: "./Ansiblelb/conteneriza_bd/ansible/playbooks/contenerizabd.yaml" 
  TARGET_GROUP: "dbservers" #validar con nombre de grupo en inventory.ini

  USER_NAME: ${{secrets.ANSIBLE_USER}} #usuario para conexión SSH validar con secret de github

jobs: 
  deploy:
    runs-on: [control-server] 

    steps:
      - name: 1. Bajar código del Repo
        uses: actions/checkout@v4

      - name: 2. Configurar SSH Agent para conexión a servidores
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{secrets.SSH_PRIVATE_KEY}}  #github secret que contiene la llave privada

      - name: 3. Ejecutar Ansible playbook 
        run: |
          # Avisamos a Ansible dónde está su archivo de configuración (.cfg)
          export ANSIBLE_CONFIG="${{ github.workspace }}/$CONFIG_FILE"
          
          echo "--- Verificando conexión con los servidores ---"
          ansible "$TARGET_GROUP" -i "$INVENTORY_FILE" -m ping -u "$USER_NAME"
          
          echo "--- Ejecutando el Playbook ---"
          ansible-playbook -i "$INVENTORY_FILE" "$PLAYBOOK_FILE" -u "$USER_NAME" -e "TARGET_GROUP=$TARGET_GROUP"
          
          

         
          